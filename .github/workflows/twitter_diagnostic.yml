name: Twitter account diagnostic

on:
  workflow_dispatch:
    inputs:
      assume_premium:
        description: Assume the account has Premium boost enabled
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      recent_posts_max:
        description: Number of recent posts to inspect for score prediction
        required: true
        default: "10"
        type: choice
        options:
          - "10"
          - "20"
      tweet_id_1:
        description: First tweet ID to verify
        required: false
        default: ""
        type: string
      tweet_id_2:
        description: Second tweet ID to verify
        required: false
        default: ""
        type: string
  schedule:
    - cron: "0 19 * * *"

permissions:
  contents: read

concurrency:
  group: twitter-account-diagnostic
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      ASSUME_PREMIUM: ${{ github.event_name == 'workflow_dispatch' && inputs.assume_premium || 'true' }}
      RECENT_POSTS_MAX: ${{ github.event_name == 'workflow_dispatch' && inputs.recent_posts_max || '10' }}
      TWEET_ID_1: ${{ inputs.tweet_id_1 }}
      TWEET_ID_2: ${{ inputs.tweet_id_2 }}
      TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
      TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m venv python/.venv
          python/.venv/bin/pip install --upgrade pip
          python/.venv/bin/pip install twitter-cli

      - name: Run runtime diagnostics
        run: |
          mkdir -p tmp/diagnostics
          python/.venv/bin/python python/check_python_runtime.py --output tmp/diagnostics/runtime.json

      - name: Restore score history
        uses: actions/cache/restore@v4
        with:
          path: tmp/diagnostics/account-score-history.jsonl
          key: ${{ runner.os }}-twitter-account-score-history-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-twitter-account-score-history-

      - name: Run Twitter diagnostics
        run: |
          mkdir -p tmp/diagnostics
          touch tmp/diagnostics/account-score-history.jsonl
          EXTRA_ARGS=""
          if [ -n "${TWEET_ID_1}" ]; then
            EXTRA_ARGS="${EXTRA_ARGS} --tweet-id ${TWEET_ID_1}"
          fi
          if [ -n "${TWEET_ID_2}" ]; then
            EXTRA_ARGS="${EXTRA_ARGS} --tweet-id ${TWEET_ID_2}"
          fi
          python/.venv/bin/python python/twitter_account_diagnostic.py --diagnostics-dir tmp/diagnostics --summary-output tmp/diagnostics/account-score.json --history-path tmp/diagnostics/account-score-history.jsonl --recent-post-limit "${RECENT_POSTS_MAX}" --assume-premium "${ASSUME_PREMIUM}" ${EXTRA_ARGS}

      - name: Write diagnostic summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          diagnostic_path = Path("tmp/diagnostics/account-score.json")
          lines = ["## Twitter account diagnostic", ""]

          if not diagnostic_path.exists():
              lines.append("diagnostic summary file was not created.")
          else:
              payload = json.loads(diagnostic_path.read_text(encoding="utf-8"))
              lines.append(f"- Status: `{payload.get('status', 'unknown')}`")
              if payload.get("status") != "ok":
                  if payload.get("error"):
                      lines.append(f"- Error: `{payload.get('error')}`")
              else:
                  score = ((payload.get("score_prediction") or {}).get("score"))
                  distribution = ((payload.get("score_prediction") or {}).get("distribution"))
                  components = ((payload.get("score_prediction") or {}).get("components") or {})
                  metrics = ((payload.get("score_prediction") or {}).get("metrics") or {})
                  lines.extend(
                      [
                          f"- Username: `{payload.get('username', '')}`",
                          f"- Name: `{payload.get('name', '')}`",
                          f"- User ID: `{payload.get('user_id', '')}`",
                          f"- Run at JST: `{payload.get('run_at_jst', '')}`",
                          f"- Predicted score: `{score}`",
                          f"- Distribution: `{distribution}`",
                          f"- Assume Premium: `{payload.get('assume_premium')}`",
                          f"- History entries: `{payload.get('history_length', '')}`",
                          "",
                          "### Component breakdown",
                          "",
                      ]
                  )
                  for key, value in components.items():
                      lines.append(f"- `{key}`: `{value}`")
                  lines.extend(
                      [
                          "",
                          "### Metrics",
                          "",
                          f"- Followers: `{metrics.get('followers', '')}`",
                          f"- Following: `{metrics.get('following', '')}`",
                          f"- Account age days: `{metrics.get('account_age_days', '')}`",
                          f"- Posts last 24h: `{metrics.get('posts_last_24h', '')}`",
                          f"- Posts last 7d: `{metrics.get('posts_last_7d', '')}`",
                          f"- Posts/day (7d avg): `{metrics.get('posts_per_day_7d', '')}`",
                          f"- Avg views/follower: `{metrics.get('average_view_per_follower', '')}`",
                          f"- Avg interaction rate: `{metrics.get('average_interaction_rate', '')}`",
                      ]
                  )
                  warnings = (payload.get("score_prediction") or {}).get("warnings") or []
                  suggestions = (payload.get("score_prediction") or {}).get("suggestions") or []
                  previews = payload.get("recent_post_preview") or []
                  lookups = payload.get("tweet_lookups") or []
                  if warnings:
                      lines.extend(["", "### Warnings", ""])
                      for warning in warnings:
                          lines.append(f"- {warning}")
                  if suggestions:
                      lines.extend(["", "### Suggestions", ""])
                      for suggestion in suggestions:
                          lines.append(f"- {suggestion}")
                  if previews:
                      lines.extend(["", "### Recent posts", "", "| ID | Created | Views | Text |", "| --- | --- | --- | --- |"])
                      for item in previews:
                          text = str(item.get("text_snippet") or "").replace("|", "\\|")
                          lines.append(
                              f"| `{item.get('id', '')}` | `{item.get('created_at', '')}` | `{item.get('views', '')}` | {text} |"
                          )
                  if lookups:
                      lines.extend(["", "### Tweet ID lookup", ""])
                      for item in lookups:
                          lines.append(f"- `{item.get('tweet_id', '')}`: `{'ok' if item.get('ok') else 'failed'}`")
                          if item.get("text"):
                              lines.append(f"  - Text: {str(item.get('text'))[:180]}")
                          if item.get("error"):
                              lines.append(f"  - Error: {item.get('error')}")

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Save score history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: tmp/diagnostics/account-score-history.jsonl
          key: ${{ runner.os }}-twitter-account-score-history-${{ github.run_id }}

      - name: Upload diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twitter-diagnostic
          path: tmp/diagnostics/
          if-no-files-found: ignore
