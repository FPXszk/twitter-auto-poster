name: Post invest

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Skip the final twitter post step
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read

concurrency:
  group: post-invest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      CATEGORY: invest
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
      TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
      TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m venv python/.venv
          python/.venv/bin/pip install --upgrade pip
          python/.venv/bin/pip install pyyaml twitter-cli

      - name: Prepare scripts
        run: |
          chmod +x scripts/*.sh scripts/lib/common.sh
          mkdir -p tmp
          touch tmp/posted_ids.txt

      - name: Restore post state
        uses: actions/cache/restore@v4
        with:
          path: tmp/posted_ids.txt
          key: ${{ runner.os }}-post-invest-state-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-post-invest-state-

      - name: Fetch and post
        run: bash scripts/fetch_and_post.sh --category "${CATEGORY}" --dry-run "${DRY_RUN}"

      - name: Write run summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          category = os.environ["CATEGORY"]
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          candidate_files = sorted(Path("tmp/runs").glob(f"candidate-{category}.*"))

          lines = [f"## {category} run summary", ""]
          if not candidate_files:
              lines.append("candidate file was not created.")
          else:
              payload = json.loads(candidate_files[-1].read_text(encoding="utf-8"))
              selected = payload.get("selected")
              if not selected:
                  lines.append("no eligible candidate was selected.")
              else:
                  score_breakdown = selected.get("score_breakdown") or {}
                  author = selected.get("screen_name") or selected.get("author_name") or "unknown"
                  lines.extend(
                      [
                          f"- Selected tweet ID: `{selected.get('id', '')}`",
                          f"- Author: `{author}`",
                          f"- Score: `{selected.get('score', 0)}`",
                          f"- Likes / Retweets / Views: `{selected.get('likes', 0)} / {selected.get('retweets', 0)} / {selected.get('views', 0)}`",
                          f"- Score breakdown: `likes={score_breakdown.get('likes', 0)}, retweets={score_breakdown.get('retweets', 0)}, views={score_breakdown.get('views', 0)}`",
                          f"- Summary: {payload.get('post_text', '')}",
                          "",
                          "### Source snippet",
                          "",
                          f"> {selected.get('text', '')}",
                      ]
                  )

              skipped = payload.get("skipped_candidates") or []
              if skipped:
                  lines.extend(["", f"- Skipped candidates logged: `{len(skipped)}`"])

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Save post state
        uses: actions/cache/save@v4
        with:
          path: tmp/posted_ids.txt
          key: ${{ runner.os }}-post-invest-state-${{ github.run_id }}

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invest-run
          path: tmp/
          if-no-files-found: ignore
