name: Post invest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read

concurrency:
  group: post-invest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      CATEGORY: invest
      TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
      TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m venv python/.venv
          python/.venv/bin/pip install --upgrade pip
          python/.venv/bin/pip install pyyaml twitter-cli

      - name: Load account mode
        id: account_mode
        run: |
          python/.venv/bin/python - <<'PY'
          import os
          from pathlib import Path
          import yaml
          
          def parse_bool(value):
              if isinstance(value, bool):
                  return value
              if isinstance(value, str) and value.strip().lower() in {"true", "false"}:
                  return value.strip().lower() == "true"
              raise SystemExit("dry_run must be a boolean")
          
          category = os.environ["CATEGORY"]
          raw = yaml.safe_load(Path("config/accounts.yaml").read_text(encoding="utf-8")) or {}
          defaults = raw.get("defaults") or {}
          accounts = raw.get("accounts") or {}
          account = accounts.get(category) or {}
          dry_run = parse_bool(account.get("dry_run", defaults.get("dry_run", True)))
          
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"dry_run={str(dry_run).lower()}\n")
          PY

      - name: Run runtime diagnostics
        run: |
          mkdir -p tmp
          python/.venv/bin/python python/check_python_runtime.py --module yaml --output tmp/invest-runtime.json

      - name: Prepare scripts
        run: |
          chmod +x scripts/*.sh scripts/lib/common.sh
          mkdir -p tmp

      - name: Restore post state
        if: steps.account_mode.outputs.dry_run != 'true'
        uses: actions/cache/restore@v4
        with:
          path: tmp/posted_ids.txt
          key: ${{ runner.os }}-post-invest-state-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-post-invest-state-

      - name: Fetch candidates and process mode
        run: bash scripts/fetch_and_post.sh --category "${CATEGORY}" --dry-run "${{ steps.account_mode.outputs.dry_run }}"

      - name: Write run summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          category = os.environ["CATEGORY"]
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          candidate_files = sorted(Path("tmp/runs").glob(f"candidate-{category}.*"))

          lines = [f"## {category} run summary", ""]
          if not candidate_files:
              lines.append("candidate file was not created.")
          else:
              payload = json.loads(candidate_files[-1].read_text(encoding="utf-8"))
              collection = payload.get("collection") or {}
              lines.extend(
                  [
                      f"- Requested mode: `{payload.get('requested_mode', 'unknown')}`",
                      f"- Result mode: `{payload.get('result_mode', 'unknown')}`",
                      f"- Payload files: `{payload.get('payload_count', 0)}`",
                      f"- User fetch status: `{collection.get('user', {})}`",
                      f"- Search fetch status: `{collection.get('search', {})}`",
                  ]
              )
              selected = payload.get("selected")
              if not selected:
                  lines.append("no eligible candidate was selected.")
              else:
                  score_breakdown = selected.get("score_breakdown") or {}
                  author = selected.get("screen_name") or selected.get("author_name") or "unknown"
                  lines.extend(
                      [
                          f"- Selected source ID: `{selected.get('source_id', 'unknown')}`",
                          f"- Selected tweet ID: `{selected.get('id', '')}`",
                          f"- Author: `{author}`",
                          f"- Score: `{selected.get('score', 0)}`",
                          f"- Likes / Retweets / Views: `{selected.get('likes', 0)} / {selected.get('retweets', 0)} / {selected.get('views', 0)}`",
                          f"- Score breakdown: `likes={score_breakdown.get('likes', 0)}, retweets={score_breakdown.get('retweets', 0)}, views={score_breakdown.get('views', 0)}`",
                          f"- Summary: {payload.get('post_text', '')}",
                          "",
                          "### Source snippet",
                          "",
                          f"> {selected.get('text', '')}",
                      ]
                  )

              skipped = payload.get("skipped_candidates") or []
              if skipped:
                  lines.extend(["", f"- Skipped candidates logged: `{len(skipped)}`"])
              if payload.get("post_result_file"):
                  lines.extend(["", f"- Post result file: `{payload.get('post_result_file')}`"])

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Save post state
        if: steps.account_mode.outputs.dry_run != 'true'
        uses: actions/cache/save@v4
        with:
          path: tmp/posted_ids.txt
          key: ${{ runner.os }}-post-invest-state-${{ github.run_id }}

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invest-run
          path: tmp/
          if-no-files-found: ignore
