name: Post invest

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Skip the final twitter post step
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "15 1 * * 1-5"

permissions:
  contents: read

concurrency:
  group: post-invest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      CATEGORY: invest
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'true' }}
      TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
      TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml twitter-cli

      - name: Prepare scripts
        run: chmod +x scripts/*.sh scripts/lib/common.sh

      - name: Restore post state
        uses: actions/cache/restore@v4
        with:
          path: tmp/state
          key: ${{ runner.os }}-post-invest-state-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-post-invest-state-

      - name: Fetch and post
        run: bash scripts/fetch_and_post.sh --category "${CATEGORY}" --dry-run "${DRY_RUN}"

      - name: Save post state
        uses: actions/cache/save@v4
        with:
          path: tmp/state
          key: ${{ runner.os }}-post-invest-state-${{ github.run_id }}

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invest-run
          path: tmp/
          if-no-files-found: ignore
