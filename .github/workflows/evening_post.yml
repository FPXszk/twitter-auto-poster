name: Evening stock post

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Skip the final twitter post step
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      force_repost:
        description: Ignore the once-per-day duplicate guard for this manual run
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "0 9 * * 1-5"

permissions:
  actions: read
  contents: read

concurrency:
  group: evening-stock-post
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
      FORCE_REPOST: ${{ github.event_name == 'workflow_dispatch' && inputs.force_repost || 'false' }}
      TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
      TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check JP market day
        id: market_day
        run: |
          python - <<'PY'
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path("python").resolve()))

          from jp_market_calendar import current_jst_date, is_jpx_business_day, jpx_closure_reason

          target_date = current_jst_date()
          should_run = is_jpx_business_day(target_date)
          reason = jpx_closure_reason(target_date) or ""

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"should_run={'true' if should_run else 'false'}\n")
              handle.write(f"target_date={target_date.isoformat()}\n")
              handle.write(f"reason={reason}\n")

          print(f"target_date={target_date.isoformat()} should_run={should_run} reason={reason or 'business-day'}")
          PY

      - name: Log skip reason
        if: steps.market_day.outputs.should_run != 'true'
        run: echo "Skipping evening stock post on ${{ steps.market_day.outputs.target_date }} (${{ steps.market_day.outputs.reason }})"

      - name: Install runtime dependencies
        if: steps.market_day.outputs.should_run == 'true'
        run: |
          python -m venv python/.venv
          python/.venv/bin/pip install --upgrade pip
          python/.venv/bin/pip install yfinance pandas twitter-cli

      - name: Prepare runtime files
        if: steps.market_day.outputs.should_run == 'true'
        run: |
          mkdir -p tmp
          touch tmp/posted_ids.txt

      - name: Restore post state
        if: steps.market_day.outputs.should_run == 'true'
        uses: actions/cache/restore@v4
        with:
          path: tmp/posted_ids.txt
          key: ${{ runner.os }}-evening-stock-state-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-evening-stock-state-

      - name: Restore stock cache
        if: steps.market_day.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python/.venv/bin/python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          repository = "${{ github.repository }}"
          result = subprocess.run(
              [
                  "gh",
                  "run",
                  "list",
                  "--repo",
                  repository,
                  "--workflow",
                  "update_tickers.yml",
                  "--branch",
                  "main",
                  "--status",
                  "success",
                  "--limit",
                  "1",
                  "--json",
                  "databaseId",
              ],
              check=True,
              capture_output=True,
              text=True,
          )
          runs = json.loads(result.stdout)
          if not runs:
              raise SystemExit("no successful update_tickers.yml run found")

          subprocess.run(
              [
                  "gh",
                  "run",
                  "download",
                  str(runs[0]["databaseId"]),
                  "--repo",
                  repository,
                  "--name",
                  "stock-cache",
                  "--dir",
                  "tmp",
              ],
              check=True,
          )

          target = Path("tmp/stock_cache.json")
          if not target.is_file():
              raise SystemExit(f"stock_cache.json was not restored to the expected path: {target}")
          PY

      - name: Run evening summary
        if: steps.market_day.outputs.should_run == 'true'
        run: |
          EXTRA_ARGS=""
          if [ "${FORCE_REPOST}" = "true" ]; then
            EXTRA_ARGS="--force-repost"
          fi
          if [ "${DRY_RUN}" = "true" ]; then
            python/.venv/bin/python python/evening_summary.py --dry-run --cache-path tmp/stock_cache.json ${EXTRA_ARGS}
          else
            python/.venv/bin/python python/evening_summary.py --cache-path tmp/stock_cache.json ${EXTRA_ARGS}
          fi

      - name: Save post state
        if: always() && steps.market_day.outputs.should_run == 'true'
        uses: actions/cache/save@v4
        with:
          path: tmp/posted_ids.txt
          key: ${{ runner.os }}-evening-stock-state-${{ github.run_id }}

      - name: Upload run artifacts
        if: always() && steps.market_day.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: evening-stock-run
          path: tmp/
          if-no-files-found: ignore
