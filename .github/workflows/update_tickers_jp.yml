name: Update JP tickers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 28-31,1-7 * *"

permissions:
  contents: read

concurrency:
  group: update-jp-tickers
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check JPX update day
        id: market_day
        run: python python/check_jpx_business_day.py --mode first-business-day-of-month --github-output

      - name: Log skip reason
        if: steps.market_day.outputs.should_run != 'true'
        run: echo "Skipping JP ticker update on ${{ steps.market_day.outputs.target_date }} (${{ steps.market_day.outputs.reason }})"

      - name: Install runtime dependencies
        if: steps.market_day.outputs.should_run == 'true'
        run: |
          python -m venv python/.venv
          python/.venv/bin/pip install --upgrade pip
          python/.venv/bin/pip install xlrd pyyaml

      - name: Run runtime diagnostics
        if: steps.market_day.outputs.should_run == 'true'
        run: |
          python/.venv/bin/python python/check_python_runtime.py --module xlrd --module yaml --output tmp/update-tickers-jp-runtime.json

      - name: Update JP ticker CSV
        if: steps.market_day.outputs.should_run == 'true'
        run: python/.venv/bin/python python/update_tickers_jp.py

      - name: Write run summary
        if: always()
        env:
          SHOULD_RUN: ${{ steps.market_day.outputs.should_run }}
          TARGET_DATE: ${{ steps.market_day.outputs.target_date }}
          SKIP_REASON: ${{ steps.market_day.outputs.reason }}
          FIRST_BUSINESS_DAY: ${{ steps.market_day.outputs.first_business_day }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_file = Path("tmp/tickers_jp_update_summary.json")
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          lines = ["## JPX ticker update", ""]
          if os.environ.get("SHOULD_RUN") != "true":
              lines.extend(
                  [
                      "- Status: `skipped`",
                      f"- JST date: `{os.environ.get('TARGET_DATE', '')}`",
                      f"- First business day: `{os.environ.get('FIRST_BUSINESS_DAY', '')}`",
                      f"- Reason: `{os.environ.get('SKIP_REASON', 'unknown')}`",
                  ]
              )
          elif not summary_file.exists():
              lines.append("summary file was not created.")
          else:
              payload = json.loads(summary_file.read_text(encoding="utf-8"))
              lines.extend(
                  [
                      f"- Status: `{payload.get('status', 'unknown')}`",
                      f"- Source: `{payload.get('source_url', '')}`",
                      f"- Generated at JST: `{payload.get('generated_at_jst', '')}`",
                      f"- Rules SHA256: `{payload.get('rules_sha256', '')}`",
                  ]
              )

              if payload.get("status") != "success":
                  lines.append(f"- Error: `{payload.get('error', 'unknown error')}`")
              else:
                  diff = payload.get("diff") or {}
                  lines.extend(
                      [
                          f"- Sheet: `{payload.get('sheet_name', '')}`",
                          f"- Selected tickers: `{payload.get('selected_count', 0)}`",
                          f"- Added / Removed / Name changed / Sector changed: `{diff.get('added_count', 0)} / {diff.get('removed_count', 0)} / {diff.get('name_changed_count', 0)} / {diff.get('sector_changed_count', 0)}`",
                          f"- Backup created: `{payload.get('backup_created', False)}`",
                      ]
                  )

                  warnings = payload.get("warnings") or []
                  if warnings:
                      lines.extend(["", "### Warnings", ""])
                      lines.extend(f"- {warning}" for warning in warnings)

                  def render_rows(title: str, rows: list[dict], formatter) -> None:
                      if not rows:
                          return
                      lines.extend(["", f"### {title}", ""])
                      lines.extend(formatter(row) for row in rows)

                  render_rows(
                      "Added (sample)",
                      diff.get("added") or [],
                      lambda row: f"- `{row.get('ticker', '')}` {row.get('name', '')} / {row.get('sector', '')}",
                  )
                  render_rows(
                      "Removed (sample)",
                      diff.get("removed") or [],
                      lambda row: f"- `{row.get('ticker', '')}` {row.get('name', '')} / {row.get('sector', '')}",
                  )
                  render_rows(
                      "Name changed (sample)",
                      diff.get("name_changed") or [],
                      lambda row: f"- `{row.get('ticker', '')}` `{row.get('old_name', '')}` -> `{row.get('new_name', '')}` / {row.get('sector', '')}",
                  )
                  render_rows(
                      "Sector changed (sample)",
                      diff.get("sector_changed") or [],
                      lambda row: f"- `{row.get('ticker', '')}` {row.get('name', '')}: `{row.get('old_sector', '')}` -> `{row.get('new_sector', '')}`",
                  )

                  detail_limit = diff.get("detail_limit", 0)
                  if detail_limit:
                      lines.extend(["", f"- Detail lists are capped at `{detail_limit}` rows in the summary artifact."])

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload JP ticker artifacts
        if: steps.market_day.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tickers-jp-update
          retention-days: 30
          path: |
            config/tickers_jp.csv
            tmp/tickers_jp_update_summary.json
          if-no-files-found: error
