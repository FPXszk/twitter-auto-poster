name: Update stock cache

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * 0-4"
    - cron: "0 8 * * 1-5"

permissions:
  contents: read

concurrency:
  group: update-stock-cache
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check JP market day
        id: market_day
        run: python python/check_jpx_business_day.py --github-output

      - name: Log skip reason
        if: steps.market_day.outputs.should_run != 'true'
        run: echo "Skipping stock cache update on ${{ steps.market_day.outputs.target_date }} (${{ steps.market_day.outputs.reason }})"

      - name: Install runtime dependencies
        if: steps.market_day.outputs.should_run == 'true'
        run: |
          python -m venv python/.venv
          python/.venv/bin/pip install --upgrade pip
          python/.venv/bin/pip install yfinance pandas pyyaml

      - name: Run runtime diagnostics
        if: steps.market_day.outputs.should_run == 'true'
        run: |
          python/.venv/bin/python python/check_python_runtime.py --module yfinance --module pandas --module yaml --output tmp/update-tickers-runtime.json

      - name: Prepare runtime files
        if: steps.market_day.outputs.should_run == 'true'
        run: mkdir -p tmp

      - name: Build stock cache
        if: steps.market_day.outputs.should_run == 'true'
        run: python/.venv/bin/python python/update_tickers.py --summary-output tmp/stock_cache_summary.json

      - name: Write run summary
        if: always()
        env:
          SHOULD_RUN: ${{ steps.market_day.outputs.should_run }}
          TARGET_DATE: ${{ steps.market_day.outputs.target_date }}
          SKIP_REASON: ${{ steps.market_day.outputs.reason }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          run_path = Path("tmp/stock_cache_summary.json")
          lines = ["## Stock cache update", ""]

          if os.environ.get("SHOULD_RUN") != "true":
              lines.extend(
                  [
                      "- Status: `skipped`",
                      f"- JST date: `{os.environ.get('TARGET_DATE', '')}`",
                      f"- Reason: `{os.environ.get('SKIP_REASON', '')}`",
                  ]
              )
          elif not run_path.exists():
              lines.append("summary file was not created.")
          else:
              payload = json.loads(run_path.read_text(encoding="utf-8"))
              lines.extend(
                  [
                      f"- Status: `{payload.get('status', 'unknown')}`",
                      f"- JST date: `{payload.get('date', '')}`",
                      f"- Trade date: `{payload.get('trade_date', '')}`",
                  ]
              )
              if payload.get("reason"):
                  lines.append(f"- Reason: `{payload.get('reason')}`")
              fetch_report = payload.get("fetch_report") or {}
              if fetch_report:
                  lines.extend(
                      [
                          f"- Snapshots: `{fetch_report.get('snapshot_count', 0)}` / `{fetch_report.get('total_records', 0)}`",
                          f"- Skipped reasons: `{fetch_report.get('skipped_reasons', {})}`",
                      ]
                  )
          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload stock cache artifact
        if: steps.market_day.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: stock-cache
          path: |
            tmp/stock_cache.json
            tmp/stock_cache_summary.json
          if-no-files-found: error
