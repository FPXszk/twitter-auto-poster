name: Update stock cache

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * 0-4"
    - cron: "0 8 * * 1-5"

permissions:
  contents: read

concurrency:
  group: update-stock-cache
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check JP market day
        id: market_day
        run: |
          python - <<'PY'
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path("python").resolve()))

          from jp_market_calendar import current_jst_date, is_jpx_business_day, jpx_closure_reason

          target_date = current_jst_date()
          should_run = is_jpx_business_day(target_date)
          reason = jpx_closure_reason(target_date) or ""

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"should_run={'true' if should_run else 'false'}\n")
              handle.write(f"target_date={target_date.isoformat()}\n")
              handle.write(f"reason={reason}\n")

          print(f"target_date={target_date.isoformat()} should_run={should_run} reason={reason or 'business-day'}")
          PY

      - name: Log skip reason
        if: steps.market_day.outputs.should_run != 'true'
        run: echo "Skipping stock cache update on ${{ steps.market_day.outputs.target_date }} (${{ steps.market_day.outputs.reason }})"

      - name: Install runtime dependencies
        if: steps.market_day.outputs.should_run == 'true'
        run: |
          python -m venv python/.venv
          python/.venv/bin/pip install --upgrade pip
          python/.venv/bin/pip install yfinance pandas

      - name: Prepare runtime files
        if: steps.market_day.outputs.should_run == 'true'
        run: mkdir -p tmp

      - name: Build stock cache
        if: steps.market_day.outputs.should_run == 'true'
        run: python/.venv/bin/python python/update_tickers.py

      - name: Upload stock cache artifact
        if: steps.market_day.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: stock-cache
          path: tmp/stock_cache.json
          if-no-files-found: error
