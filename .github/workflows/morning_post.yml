name: Morning stock post

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Skip the final twitter post step
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      force_repost:
        description: Ignore the once-per-day duplicate guard for this manual run
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "0 23 * * 0-4"

permissions:
  actions: read
  contents: read

concurrency:
  group: morning-stock-post
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
      FORCE_REPOST: ${{ github.event_name == 'workflow_dispatch' && inputs.force_repost || 'false' }}
      TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
      TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check JP market day
        id: market_day
        run: python python/check_jpx_business_day.py --github-output

      - name: Log skip reason
        if: steps.market_day.outputs.should_run != 'true'
        run: echo "Skipping morning stock post on ${{ steps.market_day.outputs.target_date }} (${{ steps.market_day.outputs.reason }})"

      - name: Install runtime dependencies
        if: steps.market_day.outputs.should_run == 'true'
        run: |
          python -m venv python/.venv
          python/.venv/bin/pip install --upgrade pip
          python/.venv/bin/pip install yfinance pandas twitter-cli pyyaml

      - name: Run runtime diagnostics
        if: steps.market_day.outputs.should_run == 'true'
        run: |
          python/.venv/bin/python python/check_python_runtime.py --module yfinance --module pandas --module yaml --output tmp/morning-runtime.json

      - name: Prepare runtime files
        if: steps.market_day.outputs.should_run == 'true'
        run: |
          mkdir -p tmp
          touch tmp/posted_ids.txt

      - name: Restore post state
        if: steps.market_day.outputs.should_run == 'true'
        uses: actions/cache/restore@v4
        with:
          path: tmp/posted_ids.txt
          key: ${{ runner.os }}-morning-stock-state-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-morning-stock-state-

      - name: Restore stock cache
        if: steps.market_day.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python/.venv/bin/python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          repository = "${{ github.repository }}"
          result = subprocess.run(
              [
                  "gh",
                  "run",
                  "list",
                  "--repo",
                  repository,
                  "--workflow",
                  "update_tickers.yml",
                  "--branch",
                  "main",
                  "--status",
                  "success",
                  "--limit",
                  "1",
                  "--json",
                  "databaseId",
              ],
              check=True,
              capture_output=True,
              text=True,
          )
          runs = json.loads(result.stdout)
          if not runs:
              raise SystemExit("no successful update_tickers.yml run found")

          subprocess.run(
              [
                  "gh",
                  "run",
                  "download",
                  str(runs[0]["databaseId"]),
                  "--repo",
                  repository,
                  "--name",
                  "stock-cache",
                  "--dir",
                  "tmp",
              ],
              check=True,
          )

          target = Path("tmp/stock_cache.json")
          if not target.is_file():
              raise SystemExit(f"stock_cache.json was not restored to the expected path: {target}")
          PY

      - name: Run morning summary
        if: steps.market_day.outputs.should_run == 'true'
        run: |
          EXTRA_ARGS=""
          if [ "${FORCE_REPOST}" = "true" ]; then
            EXTRA_ARGS="--force-repost"
          fi
          if [ "${DRY_RUN}" = "true" ]; then
            python/.venv/bin/python python/morning_summary.py --dry-run --cache-path tmp/stock_cache.json --summary-output tmp/morning_summary.json ${EXTRA_ARGS}
          else
            python/.venv/bin/python python/morning_summary.py --cache-path tmp/stock_cache.json --summary-output tmp/morning_summary.json ${EXTRA_ARGS}
          fi

      - name: Write run summary
        if: always()
        env:
          SHOULD_RUN: ${{ steps.market_day.outputs.should_run }}
          TARGET_DATE: ${{ steps.market_day.outputs.target_date }}
          SKIP_REASON: ${{ steps.market_day.outputs.reason }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          run_path = Path("tmp/morning_summary.json")
          lines = ["## Morning stock summary", ""]

          if os.environ.get("SHOULD_RUN") != "true":
              lines.extend(
                  [
                      "- Status: `skipped`",
                      f"- JST date: `{os.environ.get('TARGET_DATE', '')}`",
                      f"- Reason: `{os.environ.get('SKIP_REASON', '')}`",
                  ]
              )
          elif not run_path.exists():
              lines.append("summary file was not created.")
          else:
              payload = json.loads(run_path.read_text(encoding="utf-8"))
              lines.extend(
                  [
                      f"- Status: `{payload.get('status', 'unknown')}`",
                      f"- JST date: `{payload.get('date', '')}`",
                      f"- Trade date: `{payload.get('trade_date', '')}`",
                      f"- Variant: `{payload.get('variant', '')}`",
                      f"- Text length: `{payload.get('text_length', '')}`",
                  ]
              )
              if payload.get("reason"):
                  lines.append(f"- Reason: `{payload.get('reason')}`")
              if payload.get("expected_trade_date"):
                  lines.append(f"- Expected trade date: `{payload.get('expected_trade_date')}`")
              if payload.get("tweet_id"):
                  lines.append(f"- Tweet ID: `{payload.get('tweet_id')}`")
              if payload.get("tweet_text"):
                  lines.extend(["", "### Text", "", payload["tweet_text"]])
              cache_metadata = payload.get("cache_metadata") or {}
              fetch_report = cache_metadata.get("fetch_report") or {}
              skipped_reasons = fetch_report.get("skipped_reasons") or {}
              if skipped_reasons:
                  lines.extend(["", f"- Fetch skipped reasons: `{skipped_reasons}`"])

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Save post state
        if: always() && steps.market_day.outputs.should_run == 'true'
        uses: actions/cache/save@v4
        with:
          path: tmp/posted_ids.txt
          key: ${{ runner.os }}-morning-stock-state-${{ github.run_id }}

      - name: Upload run artifacts
        if: always() && steps.market_day.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: morning-stock-run
          path: tmp/
          if-no-files-found: ignore
