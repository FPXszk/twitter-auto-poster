name: Morning stock post

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Skip the final twitter post step
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      force_repost:
        description: Ignore the once-per-day duplicate guard for this manual run
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "0 23 * * 0-4"

permissions:
  actions: read
  contents: read

concurrency:
  group: morning-stock-post
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
      FORCE_REPOST: ${{ github.event_name == 'workflow_dispatch' && inputs.force_repost || 'false' }}
      TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
      TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m venv python/.venv
          python/.venv/bin/pip install --upgrade pip
          python/.venv/bin/pip install yfinance pandas twitter-cli

      - name: Prepare runtime files
        run: |
          mkdir -p tmp
          touch tmp/posted_ids.txt

      - name: Restore post state
        uses: actions/cache/restore@v4
        with:
          path: tmp/posted_ids.txt
          key: ${{ runner.os }}-morning-stock-state-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-morning-stock-state-

      - name: Restore stock cache
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python/.venv/bin/python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          repository = "${{ github.repository }}"
          result = subprocess.run(
              [
                  "gh",
                  "run",
                  "list",
                  "--repo",
                  repository,
                  "--workflow",
                  "update_tickers.yml",
                  "--branch",
                  "main",
                  "--status",
                  "success",
                  "--limit",
                  "1",
                  "--json",
                  "databaseId",
              ],
              check=True,
              capture_output=True,
              text=True,
          )
          runs = json.loads(result.stdout)
          if not runs:
              raise SystemExit("no successful update_tickers.yml run found")

          subprocess.run(
              [
                  "gh",
                  "run",
                  "download",
                  str(runs[0]["databaseId"]),
                  "--repo",
                  repository,
                  "--name",
                  "stock-cache",
                  "--dir",
                  "tmp",
              ],
              check=True,
          )

          target = Path("tmp/stock_cache.json")
          if not target.is_file():
              raise SystemExit(f"stock_cache.json was not restored to the expected path: {target}")
          PY

      - name: Run morning summary
        run: |
          EXTRA_ARGS=""
          if [ "${FORCE_REPOST}" = "true" ]; then
            EXTRA_ARGS="--force-repost"
          fi
          if [ "${DRY_RUN}" = "true" ]; then
            python/.venv/bin/python python/morning_summary.py --dry-run --cache-path tmp/stock_cache.json ${EXTRA_ARGS}
          else
            python/.venv/bin/python python/morning_summary.py --cache-path tmp/stock_cache.json ${EXTRA_ARGS}
          fi

      - name: Save post state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: tmp/posted_ids.txt
          key: ${{ runner.os }}-morning-stock-state-${{ github.run_id }}

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-stock-run
          path: tmp/
          if-no-files-found: ignore
