# Account-specific posting policy.
# - state_file: 空文字なら `tmp/state/<category>-posted.txt`、相対パスなら output-dir 配下に解決
# - summary_*: 候補本文を作るときの接頭辞・言語・最大文字数
# - filters / score_weights: 候補選定ロジックの調整点
defaults:
  dry_run: true
  post_prefix: "Auto update:"
  max_candidates: 1
  summary_prefix: "Xで反応上位: "
  summary_language: "ja"
  summary_max_length: 140
  state_file: ""
  score_weights:
    likes: 1
    retweets: 1
    views: 1
  filters:
    max_age_hours: 48
    required_terms: []
    exclude_keywords: []

accounts:
  invest:
    post_prefix: "Market watch:"
    max_candidates: 1
    summary_prefix: "Xで反応上位: "
    # invest は stock summary と同じ `tmp/posted_ids.txt` を共有する
    state_file: "posted_ids.txt"
    filters:
      max_age_hours: 24
      required_terms:
        - "$MU"
        - "Micron"
      exclude_keywords:
        - "earn money"
        - "join now"
        - "whatsapp"
        - "referral"

  news:
    post_prefix: "News watch:"
    max_candidates: 1
    summary_prefix: "Xで反応上位: "
    filters:
      max_age_hours: 48
